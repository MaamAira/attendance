<!DOCTYPE html>
<html>
<head>
  <title>QR Attendance System</title>

  <style>
    body {
      font-family: Arial;
      background: #f3e8ff;
      text-align: center;
    }

    .container {
      background: lavender;
      padding: 15px;
      width: 340px;
      margin: auto;
      border-radius: 12px;
    }

    input, button {
      width: 90%;
      margin: 5px;
      padding: 8px;
    }

    button {
      background: #b57edc;
      color: white;
      border: none;
      cursor: pointer;
    }

    video {
      width: 100%;
      border-radius: 10px;
    }

    table {
      width: 95%;
      margin: auto;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #999;
      padding: 5px;
      font-size: 12px;
    }

    #qrBox {
      margin: 10px auto;
    }
  </style>

  <!-- QR CODE LIB -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <!-- QR SCANNER -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <!-- XLSX -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>

<body>

<h2>📋 QR Attendance System</h2>

<div class="container">

  <!-- 1. CREATE QR -->
  <h3>1️⃣ Create QR Code</h3>
  <input id="qrText" placeholder="Enter Class / Event Code">
  <button onclick="generateQR()">Generate QR</button>
  <div id="qrBox"></div>

  <hr>

  <!-- 2. STUDENT FORM -->
  <h3>2️⃣ Student Form</h3>
  <input id="name" placeholder="Student Name">
  <input id="studentNo" placeholder="Student No (optional)">
  <input id="parentNo" placeholder="Parent Number">
  <input id="email" placeholder="Email">
  <input id="section" placeholder="Section (type here)">

  <button onclick="saveStudent()">Save Student</button>

  <hr>

  <!-- 3. QR SCANNER -->
  <h3>3️⃣ Scan QR (Camera)</h3>
  <div id="reader"></div>
  <button onclick="startScan()">Start Camera Scan</button>

  <hr>

  <!-- EXPORT -->
  <button onclick="exportExcel()">⬇ Export Excel</button>

</div>

<h3>Attendance Records</h3>
<table id="table">
  <tr>
    <th>Name</th>
    <th>Student No</th>
    <th>Parent No</th>
    <th>Email</th>
    <th>Section</th>
    <th>Status</th>
    <th>Time</th>
  </tr>
</table>

<script>
let currentQR = "";

/* ================= 1. GENERATE QR ================= */
function generateQR() {
  let text = document.getElementById("qrText").value;

  if (!text) return alert("Enter QR text");

  document.getElementById("qrBox").innerHTML = "";

  QRCode.toCanvas(text, function (err, canvas) {
    document.getElementById("qrBox").appendChild(canvas);
  });

  currentQR = text;
}

/* ================= 2. SAVE STUDENT ================= */
function saveStudent() {
  let student = {
    name: document.getElementById("name").value,
    studentNo: document.getElementById("studentNo").value,
    parentNo: document.getElementById("parentNo").value,
    email: document.getElementById("email").value,
    section: document.getElementById("section").value,
    status: "Present",
    time: new Date().toLocaleString()
  };

  let data = JSON.parse(localStorage.getItem("attendance") || "[]");
  data.push(student);
  localStorage.setItem("attendance", JSON.stringify(data));

  addRow(student);
  alert("Student saved!");
}

/* ================= 3. TABLE ================= */
function addRow(r) {
  let table = document.getElementById("table");

  let row = table.insertRow();
  row.innerHTML = `
    <td>${r.name}</td>
    <td>${r.studentNo}</td>
    <td>${r.parentNo}</td>
    <td>${r.email}</td>
    <td>${r.section}</td>
    <td>${r.status}</td>
    <td>${r.time}</td>
  `;
}

/* ================= 4. QR SCANNER ================= */
function startScan() {
  let scanner = new Html5Qrcode("reader");

  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 200 },
    (decodedText) => {
      alert("QR Scanned: " + decodedText);

      let student = JSON.parse(localStorage.getItem("attendance") || "[]");
      let last = student[student.length - 1];

      if (last) {
        last.status = "Present (QR Verified)";
        last.time = new Date().toLocaleString();
      }

      localStorage.setItem("attendance", JSON.stringify(student));

      location.reload();
    }
  );
}

/* ================= 5. EXPORT EXCEL ================= */
function exportExcel() {
  let data = JSON.parse(localStorage.getItem("attendance") || "[]");

  let ws = XLSX.utils.json_to_sheet(data);
  let wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Attendance");

  XLSX.writeFile(wb, "attendance.xlsx");
}
</script>

</body>
</html>
